<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>OpenAdBlock</title>
    <link rel="icon" href="../assets/logo.svg" type="image/svg+xml">
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="popup" id="app">
      <header class="header">
        <div class="brand">
          <svg class="logo-mark" width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 3l8 3v6c0 4.5-3.4 8.5-8 9-4.6-.5-8-4.5-8-9V6l8-3z" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"></path>
            <path d="m8.7 12.1 2.2 2.2 4.5-4.8" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"></path>
          </svg>
          <span>OpenAdBlock</span>
          <span class="version" id="version">v0.1.0</span>
        </div>
        <button class="icon-button" id="settingsButton" title="Settings" aria-label="Settings">
          <svg width="15" height="15" viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="12" r="3" fill="none" stroke="currentColor" stroke-width="1.6"></circle>
            <path d="M19.4 15a1.7 1.7 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.8-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1.1-1.5 1.7 1.7 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.8 1.7 1.7 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1a1.7 1.7 0 0 0 1.5-1.1 1.7 1.7 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.8.3H9a1.7 1.7 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.8V9a1.7 1.7 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1z" fill="none" stroke="currentColor" stroke-width="1.45" stroke-linecap="round" stroke-linejoin="round"></path>
          </svg>
        </button>
      </header>

      <section class="site-bar">
        <span class="status-dot" id="statusDot"></span>
        <span class="host" id="hostname">Loading</span>
        <span class="state-label" id="stateLabel">Protected</span>
        <button class="switch" id="siteToggle" role="switch" aria-checked="true" aria-label="Toggle protection for this site">
          <span></span>
        </button>
      </section>

      <section class="content">
        <div class="section-label">This page</div>
        <div class="stats-grid">
          <article class="stat-card">
            <span class="stat-label">Blocked</span>
            <strong id="pageBlocked">0</strong>
            <small id="pageBlockedSub">0 trackers · 0 ads · 0 other</small>
          </article>
          <article class="stat-card">
            <span class="stat-label">Saved</span>
            <strong><span id="savedAmount">0</span><span class="unit" id="savedUnit">KB</span></strong>
            <small id="savedSub">0.0s faster load</small>
          </article>
        </div>

        <div class="section-label">Lifetime</div>
        <article class="lifetime">
          <div class="lifetime-main">
            <div>
              <strong id="lifetimeBlocked">0</strong>
              <span id="lifetimeSince">blocked since install</span>
            </div>
            <div class="sparkline-wrap" aria-hidden="true">
              <svg class="sparkline" width="96" height="28" viewBox="0 0 96 28">
                <defs>
                  <linearGradient id="sparkfill" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stop-color="#84cc16" stop-opacity=".16"></stop>
                    <stop offset="100%" stop-color="#84cc16" stop-opacity="0"></stop>
                  </linearGradient>
                </defs>
                <polygon points="0,28 0,22 8,23 16,16 24,18 32,11 40,13 48,7 56,9 64,4 72,5 80,2 88,0 96,3 96,28" fill="url(#sparkfill)"></polygon>
                <polyline points="0,22 8,23 16,16 24,18 32,11 40,13 48,7 56,9 64,4 72,5 80,2 88,0 96,3" fill="none" stroke="#84cc16" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"></polyline>
                <circle cx="96" cy="3" r="2.5" fill="#84cc16" stroke="#fff" stroke-width="1.5"></circle>
              </svg>
              <span>LAST 14 DAYS</span>
            </div>
          </div>
          <div class="lifetime-grid">
            <div class="metric">
              <small>
                <svg width="11" height="11" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M13 3 4 14h7l-1 7 9-11h-7l1-7z" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"></path>
                </svg>
                Bandwidth
              </small>
              <span><strong id="bandwidthSaved">0</strong><em id="bandwidthUnit">KB</em></span>
            </div>
            <div class="metric">
              <small>
                <svg width="11" height="11" viewBox="0 0 24 24" aria-hidden="true">
                  <circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="1.7"></circle>
                  <path d="M12 7v5l3 2" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"></path>
                </svg>
                Time saved
              </small>
              <span><strong id="timeSaved">0.0</strong><em>h</em></span>
            </div>
            <div class="metric">
              <small>
                <svg width="11" height="11" viewBox="0 0 24 24" aria-hidden="true">
                  <circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="1.7"></circle>
                  <path d="M3 12h18M12 3a14 14 0 0 1 0 18M12 3a14 14 0 0 0 0 18" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"></path>
                </svg>
                Pages
              </small>
              <span><strong id="pagesSeen">0</strong></span>
            </div>
          </div>
        </article>
      </section>

      <footer class="footer">
        <button id="blockElementButton">
          <svg width="13" height="13" viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="1.6"></circle>
            <circle cx="12" cy="12" r="5" fill="none" stroke="currentColor" stroke-width="1.6"></circle>
            <circle cx="12" cy="12" r="1.4" fill="currentColor"></circle>
          </svg>
          Block element
        </button>
        <button id="reportButton">
          <svg width="13" height="13" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4 21V4M4 4h13l-2 4 2 4H4" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"></path>
          </svg>
          Report issue
        </button>
      </footer>

      <dialog class="report-dialog" id="reportDialog" aria-labelledby="reportTitle">
        <form class="report-form" id="reportForm">
          <header>
            <div>
              <h2 id="reportTitle">Report site issue</h2>
              <p id="reportHost">Current site</p>
            </div>
            <button class="icon-button" id="reportCloseButton" type="button" title="Close" aria-label="Close report form">
              <svg width="15" height="15" viewBox="0 0 24 24" aria-hidden="true">
                <path d="m6 6 12 12M18 6 6 18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></path>
              </svg>
            </button>
          </header>

          <label class="report-field">
            <span>Issue type</span>
            <select id="reportCategory">
              <option value="breakage">Page broken</option>
              <option value="missed_ad">Ad still visible</option>
              <option value="false_positive">Site blocked incorrectly</option>
              <option value="other">Other</option>
            </select>
          </label>

          <label class="report-field">
            <span>Details</span>
            <textarea id="reportDetails" maxlength="2000" rows="4" placeholder="What did you expect to happen?"></textarea>
          </label>

          <label class="check-row">
            <input id="reportIncludeUrl" type="checkbox" checked>
            <span>Include full URL in the public GitHub issue</span>
          </label>

          <label class="check-row">
            <input id="reportIncludeScreenshot" type="checkbox" checked>
            <span>Include a screenshot of the visible tab</span>
          </label>

          <div class="report-actions">
            <button class="secondary" id="reportCancelButton" type="button">Cancel</button>
            <button class="primary" id="reportSubmitButton" type="submit">Send report</button>
          </div>
        </form>
      </dialog>

      <div class="toast" id="toast" role="status" aria-live="polite" hidden></div>
    </main>
    <script type="module" src="popup.js"></script>
  </body>
</html>
