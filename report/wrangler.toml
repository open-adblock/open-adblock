name = "openadblock-report-worker"
main = "src/index.ts"
compatibility_date = "2026-04-29"

[vars]
GITHUB_REPO = "open-adblock/open-adblock"
GITHUB_LABELS = "filter:breakage,extension-report,needs-triage"
ALLOWED_ORIGINS = "chrome-extension://*,moz-extension://*"
# Required when screenshot reports are enabled.
# SCREENSHOT_PUBLIC_BASE_URL = "https://screenshots.openadblock.org"

# [[r2_buckets]]
# binding = "SCREENSHOT_BUCKET"
# bucket_name = "openadblock-report-screenshots"

# Set this before deploying:
#   wrangler secret put GITHUB_TOKEN
#
# Optional production route:
# routes = [{ pattern = "reports.openadblock.org/*", custom_domain = true }]
